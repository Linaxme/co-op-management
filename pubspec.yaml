name: ssf_cooperative
description: Offline-first SSF Cooperative society management app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  uuid: ^4.5.1

  flutter_typeahead: ^5.2.0

  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.0.2
  image_picker: ^1.1.2
  image: ^4.3.0
  file_picker: ^8.1.4
  excel: ^4.0.4
  fl_chart: ^0.69.0

  # Firebase dependencies
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  cloud_functions: ^5.2.1
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  firebase_messaging: ^15.2.4
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/header_banner.jpg